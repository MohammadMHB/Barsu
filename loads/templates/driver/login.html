{% load static %}
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود به سیستم اعلام بار</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/simple.css' %}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'Tahoma', system-ui, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            direction: rtl;
            position: relative;
            overflow: hidden;
        }
        
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 80%, rgba(255,255,255,0.05) 1%, transparent 1%),
                radial-gradient(circle at 80% 20%, rgba(255,255,255,0.05) 1%, transparent 1%);
            background-size: 40px 40px;
            animation: float 20s linear infinite;
        }
        
        @keyframes float {
            0% {
                background-position: 0 0;
            }
            100% {
                background-position: 100px 100px;
            }
        }
        
        .login-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 40px 35px;
            width: 100%;
            max-width: 420px;
            margin: 20px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: transform 0.3s ease;
            animation: fadeInUp 0.6s ease;
        }
        
        .login-card:hover {
            transform: translateY(-5px);
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .logo {
            text-align: center;
            margin-bottom: 35px;
        }
        
        .logo-icon {
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 18px;
            box-shadow: 0 10px 25px rgba(0, 210, 255, 0.3);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 10px 25px rgba(0, 210, 255, 0.3);
            }
            50% {
                box-shadow: 0 15px 35px rgba(0, 210, 255, 0.5);
            }
        }
        
        .logo-icon span {
            font-size: 42px;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.2));
        }
        
        .logo h1 {
            color: white;
            font-size: 26px;
            margin-bottom: 8px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }
        
        .logo p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
        }
        
        /* فرم */
        .form-group {
            margin-bottom: 22px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.85);
            font-size: 13px;
            font-weight: 500;
        }
        
        .input-wrapper {
            position: relative;
        }
        
        .input-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            opacity: 0.6;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px 45px 14px 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 14px;
            font-size: 14px;
            color: white;
            transition: all 0.3s;
            font-family: inherit;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #00d2ff;
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 0 3px rgba(0, 210, 255, 0.2);
        }
        
        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 210, 255, 0.3);
        }
        
        .btn-login:active {
            transform: translateY(0);
        }
        
        .alert {
            padding: 12px 15px;
            border-radius: 14px;
            margin-bottom: 20px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(4px);
        }
        
        .alert-error {
            background: rgba(220, 53, 69, 0.2);
            color: #ff8a7a;
            border: 1px solid rgba(220, 53, 69, 0.3);
        }
        
        .alert-success {
            background: rgba(40, 167, 69, 0.2);
            color: #7ae9a0;
            border: 1px solid rgba(40, 167, 69, 0.3);
        }
        
        .alert-info {
            background: rgba(0, 210, 255, 0.2);
            color: #6ae5ff;
            border: 1px solid rgba(0, 210, 255, 0.3);
        }
        
        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
        }
        
        .role-badge {
            display: inline-block;
            background: rgba(255,255,255,0.1);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
            margin-top: 5px;
        }
        
        @media (max-width: 480px) {
            .login-card {
                padding: 30px 25px;
                margin: 15px;
            }
            .logo h1 {
                font-size: 22px;
            }
            .logo-icon {
                width: 65px;
                height: 65px;
            }
            .logo-icon span {
                font-size: 34px;
            }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <div class="logo-icon">
                <span>🚚</span>
            </div>
            <h1>سیستم اعلام بار</h1>
            <p>مدیریت هوشمند حمل و نقل شهری</p>
        </div>
        
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags|default:'info' }}">
                    <span>ℹ️</span>
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>👤 نام کاربری</label>
                <div class="input-wrapper">
                    <input type="text" name="username" placeholder="نام کاربری خود را وارد کنید" required autocomplete="off">
                </div>
            </div>
            
            <div class="form-group">
                <label>🔒 رمز عبور</label>
                <div class="input-wrapper">
                    <input type="password" name="password" placeholder="رمز عبور خود را وارد کنید" required>
                </div>
            </div>
            
            <button type="submit" class="btn-login">
                <span>✨</span>
                ورود به پنل
                <span>→</span>
            </button>
        </form>
        
        
        <div class="footer">
            <span>🚚 سیستم مدیریت بار شهری</span>
            <div class="role-badge">نسخه 1.0</div>
        </div>
    </div>
</body>
</html>
